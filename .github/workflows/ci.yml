name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: roda no runner gerenciado pelo GitHub ──────────────────────────
  build-and-test:
    name: Install, Test e Build (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes com cobertura
        run: npm test

      - name: Publicar relatório de cobertura no PR
        if: github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: ./coverage/coverage-summary.json
          base-coverage-file: ./coverage/coverage-summary.json

      - name: Salvar relatório de cobertura como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Executar build
        run: npm run build

  # ── JOB 2: roda no self-hosted runner (sua máquina Windows) ───────────────
  build-and-test-self-hosted:
    name: Install, Test e Build (Self-Hosted Windows)
    runs-on: self-hosted

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm install

      - name: Executar testes com cobertura
        run: npm test

      - name: Executar build
        run: npm run build

      - name: Confirmar ambiente do runner
        run: |
          echo "Rodando em: $env:COMPUTERNAME"
          echo "Sistema: $env:OS"
          node --version
          npm --version
